<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nós ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#0f0f14;
  color:#fff;
}

.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  background:linear-gradient(180deg, rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://picsum.photos/1200/800?blur=3');
  background-size:cover;
  background-position:center;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:3.5rem;
}

.hero p{
  opacity:0.7;
  margin-top:10px;
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  border-radius:30px;
  border:none;
  background:#fff;
  color:#000;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.05);
}

.section{
  padding:60px 20px;
  max-width:1000px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#181820;
  border-radius:20px;
  overflow:hidden;
  transition:.4s;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card p{
  padding:15px;
  opacity:.8;
}

.timer{
  font-size:2rem;
  text-align:center;
  margin-top:20px;
}

.reveal{
  text-align:center;
  margin-top:40px;
}

.hidden{
  opacity:0;
  transform:translateY(20px);
  transition:.6s;
}

.show{
  opacity:1;
  transform:translateY(0);
}

footer{
  text-align:center;
  padding:30px;
  opacity:.5;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Eu & Você</h1>
  <p>um pequeno pedaço do nosso infinito</p>
  <button class="btn" onclick="scrollToSection()">ver mais</button>
</div>

<div class="section">
  <div class="grid">
    <div class="card hidden">
      <img src="https://picsum.photos/400/300?1">
      <p>"você chegou e tudo fez sentido."</p>
    </div>
    <div class="card hidden">
      <img src="https://picsum.photos/400/300?2">
      <p>"entre bilhões, eu escolheria você."</p>
    </div>
    <div class="card hidden">
      <img src="https://picsum.photos/400/300?3">
      <p>"meu lugar favorito sempre vai ser você."</p>
    </div>
  </div>

  <div class="timer" id="timer"></div>

  <div class="reveal">
    <button class="btn" onclick="toggleMsg()">abrir mensagem</button>
    <p id="msg" style="margin-top:15px; display:none; opacity:.8">
      eu te escolheria em todas as vidas ❤️
    </p>
  </div>
</div>

<footer>
  feito com ❤️
</footer>

<script>

// SCROLL
function scrollToSection(){
  window.scrollTo({top:window.innerHeight,behavior:'smooth'})
}

// TIMER
const startDate = new Date("2024-01-01T00:00:00")

function updateTimer(){
  const now = new Date()
  const diff = now - startDate

  const d = Math.floor(diff / (1000*60*60*24))
  const h = Math.floor((diff/(1000*60*60))%24)
  const m = Math.floor((diff/(1000*60))%60)

  document.getElementById('timer').innerText = `${d} dias • ${h}h • ${m}m`
}

setInterval(updateTimer,1000)
updateTimer()

// MESSAGE
function toggleMsg(){
  const el = document.getElementById('msg')
  el.style.display = el.style.display === 'none' ? 'block' : 'none'
}

// SCROLL ANIMATION
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('show')
    }
  })
})

document.querySelectorAll('.hidden').forEach(el=>observer.observe(el))

</script>

</body>
</html>

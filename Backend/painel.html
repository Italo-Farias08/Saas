<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin — Gold Line</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #1a0a12; min-height: 100vh; padding: 20px; }
  h1 { color: white; font-size: 24px; margin-bottom: 4px; }
  .subtitle { color: #9e7b8a; font-size: 13px; margin-bottom: 24px; }
  .stats { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat { background: #2a0d1e; border: 1px solid rgba(233,30,140,0.2); border-radius: 14px; padding: 16px 24px; color: white; }
  .stat span { display: block; font-size: 28px; font-weight: 700; color: #e91e8c; }
  .stat p { font-size: 12px; color: #9e7b8a; margin-top: 2px; }
  .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { padding: 8px 16px; border-radius: 50px; border: 1px solid rgba(233,30,140,0.3); background: transparent; color: #9e7b8a; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .filter-btn.active { background: #e91e8c; color: white; border-color: #e91e8c; }
  .card { background: #fdf8f5; border-radius: 16px; padding: 16px 20px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .card-info h3 { font-size: 15px; color: #3d1a2a; }
  .card-info p { font-size: 12px; color: #9e7b8a; margin-top: 2px; }
  .badge { display: inline-block; padding: 4px 10px; border-radius: 50px; font-size: 11px; font-weight: 500; margin-top: 6px; }
  .badge.pending { background: #fff8e1; color: #92400e; }
  .badge.approved { background: #e8f8ef; color: #0d6e3a; }
  .actions { display: flex; gap: 8px; }
  .btn-approve { padding: 8px 16px; background: #e91e8c; color: white; border: none; border-radius: 10px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-approve:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-delete { padding: 8px 16px; background: #fce8f0; color: #c0134a; border: none; border-radius: 10px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-zap { padding: 8px 16px; background: #25d366; color: white; border: none; border-radius: 10px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: none; display: inline-block; }
  .login-box { background: #fdf8f5; border-radius: 20px; padding: 40px; max-width: 360px; margin: 80px auto; text-align: center; }
  .login-box h2 { color: #3d1a2a; margin-bottom: 20px; }
  .login-box input { width: 100%; padding: 12px 16px; border: 1.5px solid #f0e0e8; border-radius: 10px; font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; margin-bottom: 12px; }
  .login-box button { width: 100%; padding: 14px; background: linear-gradient(135deg, #e91e8c, #ad1457); color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  #main { display: none; }
  .empty { text-align: center; color: #9e7b8a; padding: 40px; }
</style>
</head>
<body>

<div class="login-box" id="login-box">
  <h2>🔐 Painel Admin</h2>
  <input type="password" id="secret-input" placeholder="Senha secreta" />
  <button onclick="entrar()">Entrar</button>
  <p id="login-error" style="color:#c0134a;font-size:13px;margin-top:10px;"></p>
</div>

<div id="main">
  <h1>💕 Painel Gold Line</h1>
  <p class="subtitle">Gerencie pagamentos e sites cadastrados</p>

  <div class="stats">
    <div class="stat"><span id="total-count">0</span><p>Total de cadastros</p></div>
    <div class="stat"><span id="pending-count">0</span><p>Aguardando pagamento</p></div>
    <div class="stat"><span id="approved-count">0</span><p>Pagamentos aprovados</p></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filtrar('todos')">Todos</button>
    <button class="filter-btn" onclick="filtrar('pending')">Pendentes</button>
    <button class="filter-btn" onclick="filtrar('approved')">Aprovados</button>
  </div>

  <div id="lista"></div>
</div>

<script>
  const API = 'https://goldlovil.online';
  let secret = '';
  let todos = [];
  let filtroAtual = 'todos';

  function entrar() {
    secret = document.getElementById('secret-input').value;
    carregarDados();
  }

  document.getElementById('secret-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') entrar();
  });

  async function carregarDados() {
    try {
      const res = await fetch(`${API}/api/admin/pendentes?secret=${secret}`);
      if (res.status === 401) {
        document.getElementById('login-error').textContent = 'Senha incorreta!';
        return;
      }
      todos = await res.json();
      document.getElementById('login-box').style.display = 'none';
      document.getElementById('main').style.display = 'block';
      renderizar();
    } catch (e) {
      document.getElementById('login-error').textContent = 'Erro ao conectar.';
    }
  }

  function filtrar(tipo) {
    filtroAtual = tipo;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderizar();
  }

  function renderizar() {
    const pendentes = todos.filter(u => !u.paid);
    const aprovados = todos.filter(u => u.paid);
    document.getElementById('total-count').textContent = todos.length;
    document.getElementById('pending-count').textContent = pendentes.length;
    document.getElementById('approved-count').textContent = aprovados.length;

    let lista = todos;
    if (filtroAtual === 'pending') lista = pendentes;
    if (filtroAtual === 'approved') lista = aprovados;

    const el = document.getElementById('lista');
    if (!lista.length) { el.innerHTML = '<div class="empty">Nenhum cadastro encontrado.</div>'; return; }

el.innerHTML = lista.map(u => {
  const nome = encodeURIComponent(u.name);
  const isPending = !u.paid;
  return `
    <div class="card" id="card-${u.id}">
      <div class="card-info">
        <h3>${u.name}</h3>
        <p>${u.email}</p>
        <p style="font-size:11px;color:#b0909f;margin-top:2px;">Cadastrado em: ${new Date(u.created_at).toLocaleString('pt-BR')}</p>
        <span class="badge ${u.paid ? 'approved' : 'pending'}">${u.paid ? '✅ Aprovado' : '⏳ Pendente'}</span>
      </div>
      <div class="actions">
        ${isPending ? `
          <a class="btn-zap" href="https://wa.me/5581991204180?text=Ol%C3%A1%20${nome}!%20Seu%20pagamento%20foi%20confirmado!" target="_blank">💬 Avisar</a>
          <button class="btn-approve" onclick="aprovar('${u.id}')">✅ Aprovar</button>
        ` : `
          <a class="btn-zap" href="https://wa.me/5581991204180?text=Ol%C3%A1%20${nome}!" target="_blank">💬 Contato</a>
        `}
        <button class="btn-delete" onclick="deletar('${u.id}')">🗑️ Deletar</button>
      </div>
    </div>
  `;
}).join('');

}

  async function aprovar(userId) {
    if (!confirm('Aprovar pagamento deste usuário?')) return;
    const res = await fetch(`${API}/api/payment/approve`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, secret })
    });
    const data = await res.json();
    if (data.success) {
      todos = todos.map(u => u.id === userId ? { ...u, paid: true, payment_status: 'approved' } : u);
      renderizar();
    } else {
      alert('Erro ao aprovar!');
    }
  }

  async function deletar(userId) {
  if (!confirm('Deletar este site? Isso é irreversível!')) return;
  const res = await fetch(`${API}/api/admin/site/${userId}?secret=${secret}`, {
    method: 'DELETE'
  });
  const data = await res.json();
  if (data.success) {
    todos = todos.filter(u => u.id !== userId);
    renderizar();
  } else {
    alert('Erro ao deletar!');
  }
}
  // Atualiza a cada 30 segundos
  setInterval(() => { if (secret) carregarDados(); }, 30000);
</script>
</body>
</html>
